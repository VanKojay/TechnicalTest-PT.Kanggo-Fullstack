version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: kanggo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kanggo_taskmanager
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kanggo-network

  backend:
    build: ./backend
    container_name: kanggo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: kanggo_taskmanager
      JWT_SECRET: kanggo_production_secret_key_2026
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kanggo-network

  frontend:
    build: ./frontend
    container_name: kanggo-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kanggo-network

volumes:
  mysql_data:

networks:
  kanggo-network:
    driver: bridge
